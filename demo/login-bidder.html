<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞拍人登录 - 拍卖系统 Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
          <h4>竞拍人登录</h4>
          <p class="text-muted small">使用注册时的账号与密码登录竞拍端</p>
        </div>
        <div class="card card-body">
          <form id="bidderForm">
            <div class="mb-2">
              <label class="form-label">账号</label>
              <input type="text" class="form-control" id="bidderLogin" placeholder="手机号/邮箱" autocomplete="username">
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="bidderPassword" placeholder="密码" autocomplete="current-password">
            </div>
            <div class="mb-3">
              <a href="signup.html" class="small">没有账号？竞拍人注册</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
          </form>
        </div>
        <p class="text-center mt-3">
          <a href="index.html" class="text-muted small">返回首页</a>
        </p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var returnUrl = params.get('returnUrl') || 'index.html';

      document.getElementById('bidderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var login = document.getElementById('bidderLogin').value;
        var pwd = document.getElementById('bidderPassword').value;
        var user = Auth.loginBidder(login, pwd);
        if (user) location.href = returnUrl;
        else alert('账号或密码错误');
      });
    })();
  </script>
</body>
</html>
