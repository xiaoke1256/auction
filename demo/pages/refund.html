<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退还保证金 - 拍卖系统 Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="demo-nav d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">7. 退还保证金</h5>
      <a href="../index.html" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>

    <p class="text-muted small">未中标竞拍人的保证金全额退还；买受人保证金冲抵成交款，不在此列表退还。</p>

    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>竞拍人</th>
            <th>拍品</th>
            <th>保证金金额</th>
            <th>缴纳时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="refundTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.requireRole('admin');
    function getRefundList() {
      return MockData.deposits.filter(d => d.status === 'refund_pending' || d.status === 'refunded');
    }

    function render() {
      const tbody = document.getElementById('refundTableBody');
      const list = getRefundList();
      tbody.innerHTML = list.map(d => `
        <tr>
          <td>${d.bidderName}</td>
          <td>${d.lotName}</td>
          <td>¥${d.amount.toLocaleString()}</td>
          <td>${d.paidAt}</td>
          <td>
            ${d.status === 'refund_pending' ? '<span class="badge badge-refund-pending">待退款</span>' : '<span class="badge badge-refund-done">已退款</span>'}
          </td>
          <td>
            ${d.status === 'refund_pending' ? `<button class="btn btn-sm btn-outline-success" onclick="confirmRefund(${d.id})">确认退款</button>` : (d.refundedAt ? '退款于 ' + d.refundedAt : '—')}
          </td>
        </tr>
      `).join('');
    }

    function confirmRefund(depositId) {
      const d = MockData.deposits.find(x => x.id === depositId);
      if (d && d.status === 'refund_pending') {
        d.status = 'refunded';
        d.refundedAt = new Date().toLocaleString('zh-CN');
        d.refundSerial = 'REF' + Date.now();
      }
      render();
    }

    render();
  </script>
</body>
</html>
