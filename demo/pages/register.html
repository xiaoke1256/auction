<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞价报名 - 拍卖系统 Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="demo-nav d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">3. 竞价报名</h5>
      <a href="../index.html" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>

    <div id="stepSelect" class="mb-4">
      <label class="form-label">选择拍品</label>
      <select class="form-select" id="lotSelect">
        <option value="">-- 请选择拍品 --</option>
      </select>
    </div>

    <div id="lotInfo" class="card mb-4 d-none">
      <div class="card-body">
        <h6 class="card-title" id="regLotName"></h6>
        <p class="mb-1">保证金 = 底价 × 20%</p>
        <p class="mb-0 text-primary fs-5">应缴保证金：<strong id="regDepositAmount">¥0</strong></p>
        <p class="small text-muted mt-2">本平台暂不支持在线支付，请线下缴纳后点击「模拟保证金到账」完成报名。</p>
      </div>
    </div>

    <div id="bidderForm" class="card mb-4 d-none">
      <div class="card-header">竞拍人信息 <span class="badge bg-secondary ms-2">由竞拍人登记处自动带入</span></div>
      <div class="card-body">
        <form id="form">
          <div class="mb-2">
            <label class="form-label">姓名</label>
            <input type="text" class="form-control" id="bidderName" readonly>
          </div>
          <div class="mb-2">
            <label class="form-label">联系方式</label>
            <input type="text" class="form-control" id="bidderContact" readonly>
          </div>
          <div class="mb-2">
            <label class="form-label">证件号</label>
            <input type="text" class="form-control" id="bidderIdNo" readonly placeholder="身份证/营业执照号">
          </div>
          <button type="button" class="btn btn-primary" onclick="submitRegister()">模拟保证金到账并报名</button>
        </form>
      </div>
    </div>

    <div id="regSuccess" class="alert alert-success d-none" role="alert">
      报名成功，保证金已到账。请等待管理员审核通过后即可参与竞价。您可在下方查看报名状态。
    </div>

    <div class="card mt-4 d-none" id="myRegistersCard">
      <div class="card-header">我的报名</div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0">
          <thead><tr><th>拍品</th><th>保证金</th><th>到账时间</th><th>状态</th></tr></thead>
          <tbody id="myRegistersBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.requireRole('bidder');
    const params = new URLSearchParams(location.search);
    const presetLotId = params.get('lotId');

    function fillBidderInfoFromAccount() {
      var user = Auth.getCurrentUser();
      if (!user || user.role !== 'bidder') return;
      var account = MockData.bidderAccounts.find(function(b) { return b.id === user.id || b.login === user.login; });
      if (account) {
        document.getElementById('bidderName').value = account.name || '';
        document.getElementById('bidderContact').value = account.contact || '';
        document.getElementById('bidderIdNo').value = account.idNo || '';
      }
    }

    function initLotSelect() {
      const sel = document.getElementById('lotSelect');
      const publicLots = MockData.lots.filter(l => l.status === 'published' || l.status === 'auction');
      sel.innerHTML = '<option value="">-- 请选择拍品 --</option>' + publicLots.map(l => `<option value="${l.id}">${l.name}（保证金 ¥${(l.reservePrice * 0.2).toLocaleString()}）</option>`).join('');
      if (presetLotId) sel.value = presetLotId;
      sel.addEventListener('change', onLotChange);
      if (presetLotId) onLotChange();
    }

    function onLotChange() {
      const id = document.getElementById('lotSelect').value;
      const lotInfo = document.getElementById('lotInfo');
      const bidderForm = document.getElementById('bidderForm');
      const regSuccess = document.getElementById('regSuccess');
      regSuccess.classList.add('d-none');
      if (!id) {
        lotInfo.classList.add('d-none');
        bidderForm.classList.add('d-none');
        return;
      }
      const lot = MockData.lots.find(l => l.id === parseInt(id, 10));
      if (!lot) return;
      lotInfo.classList.remove('d-none');
      bidderForm.classList.remove('d-none');
      fillBidderInfoFromAccount();
      document.getElementById('regLotName').textContent = lot.name;
      document.getElementById('regDepositAmount').textContent = '¥' + (lot.reservePrice * 0.2).toLocaleString();
    }

    function submitRegister() {
      const lotId = parseInt(document.getElementById('lotSelect').value, 10);
      const name = document.getElementById('bidderName').value.trim();
      const contact = document.getElementById('bidderContact').value.trim();
      const idNo = document.getElementById('bidderIdNo').value.trim();
      if (!lotId || !name) {
        alert('请确认竞拍人信息已从竞拍人登记处带入');
        return;
      }
      const lot = MockData.lots.find(l => l.id === lotId);
      if (!lot) return;
      const amount = Math.round(lot.reservePrice * 0.2);
      const newId = (MockData.deposits.length ? Math.max(...MockData.deposits.map(d => d.id)) : 0) + 1;
      var user = Auth.getCurrentUser();
      var bidderId = (user && user.id) ? user.id : newId;
      MockData.deposits.push({
        id: newId, lotId, lotName: lot.name, bidderId: bidderId, bidderName: name, amount, status: 'pending_review',
        paidAt: new Date().toLocaleString('zh-CN'), serialNo: 'DEP' + Date.now()
      });
      document.getElementById('regSuccess').classList.remove('d-none');
      renderMyRegisters();
    }

    function registerStatusText(s) {
      if (s === 'pending_review') return '待审核';
      if (s === 'approved') return '已通过';
      if (s === 'rejected') return '已拒绝';
      if (s === 'refund_pending') return '已通过(待退款)';
      if (s === 'refunded') return '已通过(已退款)';
      return s || '—';
    }

    function renderMyRegisters() {
      var user = Auth.getCurrentUser();
      if (!user || user.role !== 'bidder') return;
      var list = MockData.deposits.filter(function(d) { return d.bidderId === user.id; });
      var card = document.getElementById('myRegistersCard');
      var tbody = document.getElementById('myRegistersBody');
      if (!list.length) {
        card.classList.add('d-none');
        return;
      }
      card.classList.remove('d-none');
      tbody.innerHTML = list.map(function(d) {
        var badge = d.status === 'pending_review' ? 'warning' : (d.status === 'approved' || d.status === 'refund_pending' || d.status === 'refunded' ? 'success' : 'danger');
        return '<tr><td>' + d.lotName + '</td><td>¥' + (d.amount || 0).toLocaleString() + '</td><td>' + (d.paidAt || '') + '</td><td><span class="badge bg-' + badge + '">' + registerStatusText(d.status) + '</span></td></tr>';
      }).join('');
    }

    initLotSelect();
    renderMyRegisters();
  </script>
</body>
</html>
