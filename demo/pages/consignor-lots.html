<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>委托人及拍买管理 - 拍卖系统 Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="demo-nav d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">1. 委托人及拍买管理</h5>
      <a href="../index.html" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>

    <ul class="nav nav-tabs mb-3" id="tab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="consignors-tab" data-bs-toggle="tab" data-bs-target="#consignors" type="button">委托人管理</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="lots-tab" data-bs-toggle="tab" data-bs-target="#lots" type="button">拍品管理</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="auction-tab" data-bs-toggle="tab" data-bs-target="#auction" type="button">拍卖管理</button>
      </li>
    </ul>

    <div class="tab-content" id="tabContent">
      <div class="tab-pane fade show active" id="consignors">
        <p class="text-muted small">委托人信息、登记与审核。审核通过后可创建拍品。</p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>姓名/机构</th>
                <th>联系方式</th>
                <th>证件号</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="consignorsTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="tab-pane fade" id="lots">
        <p class="text-muted small">拍品基本信息、评估与底价、状态流转（草稿→待公示→已公示→拍卖中→已成交/流拍）。</p>
        <div class="mb-3">
          <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#lotFormModal" onclick="openLotForm()">新增拍品</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>拍品名称</th>
                <th>分类</th>
                <th>委托人</th>
                <th>底价</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="lotsTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="tab-pane fade" id="auction">
        <p class="text-muted small">拍卖委托书：由委托人与拍卖平台签署，签署后可进入公示/拍卖流程。</p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>拍品</th>
                <th>委托人</th>
                <th>签署状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="auctionTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="lotFormModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="lotFormTitle">新增拍品</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="lotForm">
            <input type="hidden" id="lotId">
            <div class="mb-2">
              <label class="form-label">名称</label>
              <input type="text" class="form-control" id="lotName" required>
            </div>
            <div class="mb-2">
              <label class="form-label">分类</label>
              <input type="text" class="form-control" id="lotCategory" placeholder="如：瓷器、书画">
            </div>
            <div class="mb-2">
              <label class="form-label">描述</label>
              <textarea class="form-control" id="lotDesc" rows="2"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label">底价</label>
              <input type="number" class="form-control" id="lotReservePrice" min="0">
            </div>
            <div class="mb-2">
              <label class="form-label">起拍价</label>
              <input type="number" class="form-control" id="lotStartPrice" min="0">
            </div>
            <div class="mb-2">
              <label class="form-label">加价幅度</label>
              <input type="number" class="form-control" id="lotMinIncrement" min="0">
            </div>
            <div class="mb-2">
              <label class="form-label">委托人</label>
              <select class="form-select" id="lotConsignorId"></select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="submitLotForm()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.requireRole('admin');
    const statusMap = { draft: '草稿', pending: '待公示', published: '已公示', auction: '拍卖中', sold: '已成交', unsold: '流拍' };
    const statusClass = { draft: 'badge-draft', pending: 'badge-pending', published: 'badge-published', auction: 'badge-auction', sold: 'badge-sold', unsold: 'badge-unsold' };

    function renderConsignors() {
      const tbody = document.getElementById('consignorsTableBody');
      tbody.innerHTML = MockData.consignors.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.contact}</td>
          <td>${c.idNo}</td>
          <td><span class="badge bg-success">已审核</span></td>
        </tr>
      `).join('');
    }

    function renderLots() {
      const tbody = document.getElementById('lotsTableBody');
      tbody.innerHTML = MockData.lots.map(lot => `
        <tr>
          <td>${lot.name}</td>
          <td>${lot.category}</td>
          <td>${lot.consignorName}</td>
          <td>¥${(lot.reservePrice || 0).toLocaleString()}</td>
          <td><span class="badge ${statusClass[lot.status] || 'bg-secondary'}">${statusMap[lot.status] || lot.status}</span></td>
          <td>
            ${['draft', 'pending'].includes(lot.status) ? `<button class="btn btn-sm btn-outline-primary me-1" onclick="openLotForm(${lot.id})">编辑</button>` : ''}
            ${lot.status === 'draft' ? `<button class="btn btn-sm btn-outline-success me-1" onclick="setStatus(${lot.id}, 'pending')">提交公示</button>` : ''}
            ${lot.status === 'pending' ? `<button class="btn btn-sm btn-outline-info me-1" onclick="setStatus(${lot.id}, 'published')">发布公示</button>` : ''}
            ${lot.status === 'published' ? `<button class="btn btn-sm btn-outline-warning" onclick="setStatus(${lot.id}, 'auction')">开始拍卖</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    function renderAuction() {
      const tbody = document.getElementById('auctionTableBody');
      tbody.innerHTML = (MockData.commissionContracts || []).map(c => `
        <tr>
          <td>${c.lotName}</td>
          <td>${c.consignorName}</td>
          <td>${c.signed ? '<span class="badge bg-success">已签署</span>' : '<span class="badge bg-warning text-dark">待签署</span>'}</td>
          <td>${c.signed ? (c.signedAt ? '签署于 ' + c.signedAt : '—') : `<button class="btn btn-sm btn-outline-success" onclick="signCommission(${c.id})">确认签署委托书</button>`}</td>
        </tr>
      `).join('');
    }

    function signCommission(id) {
      const c = MockData.commissionContracts.find(x => x.id === id);
      if (c && !c.signed) {
        c.signed = true;
        c.signedAt = new Date().toLocaleDateString('zh-CN');
      }
      renderAuction();
    }

    function openLotForm(id) {
      document.getElementById('lotFormTitle').textContent = id ? '编辑拍品' : '新增拍品';
      document.getElementById('lotId').value = id || '';
      const select = document.getElementById('lotConsignorId');
      select.innerHTML = MockData.consignors.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      if (id) {
        const lot = MockData.lots.find(l => l.id === id);
        if (lot) {
          document.getElementById('lotName').value = lot.name;
          document.getElementById('lotCategory').value = lot.category;
          document.getElementById('lotDesc').value = lot.desc || '';
          document.getElementById('lotReservePrice').value = lot.reservePrice;
          document.getElementById('lotStartPrice').value = lot.startPrice;
          document.getElementById('lotMinIncrement').value = lot.minIncrement;
          document.getElementById('lotConsignorId').value = lot.consignorId;
        }
      } else {
        document.getElementById('lotForm').reset();
        document.getElementById('lotId').value = '';
      }
    }

    function submitLotForm() {
      const id = document.getElementById('lotId').value;
      const consignorId = parseInt(document.getElementById('lotConsignorId').value, 10);
      const consignor = MockData.consignors.find(c => c.id === consignorId);
      const payload = {
        name: document.getElementById('lotName').value,
        category: document.getElementById('lotCategory').value,
        desc: document.getElementById('lotDesc').value,
        reservePrice: parseInt(document.getElementById('lotReservePrice').value, 10) || 0,
        startPrice: parseInt(document.getElementById('lotStartPrice').value, 10) || 0,
        minIncrement: parseInt(document.getElementById('lotMinIncrement').value, 10) || 0,
        consignorId,
        consignorName: consignor ? consignor.name : ''
      };
      if (id) {
        const lot = MockData.lots.find(l => l.id === parseInt(id, 10));
        if (lot) Object.assign(lot, payload);
      } else {
        payload.id = Math.max(...MockData.lots.map(l => l.id), 0) + 1;
        payload.status = 'draft';
        payload.image = 'https://via.placeholder.com/300x200?text=New';
        payload.publishStart = payload.publishEnd = payload.auctionStart = payload.auctionEnd = '';
        payload.depositRate = 0.2;
        MockData.lots.push(payload);
        if (MockData.commissionContracts) {
          MockData.commissionContracts.push({
            id: Math.max(...MockData.commissionContracts.map(x => x.id), 0) + 1,
            lotId: payload.id,
            lotName: payload.name,
            consignorName: payload.consignorName,
            signed: false,
            signedAt: null
          });
        }
      }
      bootstrap.Modal.getInstance(document.getElementById('lotFormModal')).hide();
      renderLots();
      if (MockData.commissionContracts) renderAuction();
    }

    function setStatus(lotId, status) {
      const lot = MockData.lots.find(l => l.id === lotId);
      if (lot) lot.status = status;
      renderLots();
    }

    renderConsignors();
    renderLots();
    renderAuction();
  </script>
</body>
</html>
