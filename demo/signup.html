<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞拍人注册 - 拍卖系统 Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
          <h4>竞拍人注册</h4>
          <p class="text-muted small">在平台自助注册后即可登录竞拍端</p>
        </div>
        <div class="card card-body">
          <form id="signupForm">
            <div class="mb-2">
              <label class="form-label">登录账号 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="login" placeholder="手机号或邮箱" required autocomplete="username">
            </div>
            <div class="mb-2">
              <label class="form-label">密码 <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="password" placeholder="设置登录密码" required autocomplete="new-password">
            </div>
            <div class="mb-2">
              <label class="form-label">姓名 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" placeholder="真实姓名" required>
            </div>
            <div class="mb-2">
              <label class="form-label">联系方式</label>
              <input type="text" class="form-control" id="contact" placeholder="电话/邮箱">
            </div>
            <div class="mb-3">
              <label class="form-label">证件号</label>
              <input type="text" class="form-control" id="idNo" placeholder="身份证/营业执照号">
            </div>
            <button type="submit" class="btn btn-primary w-100">注册并登录</button>
          </form>
        </div>
        <p class="text-center mt-3">
          <a href="login-bidder.html" class="small">已有账号？去登录</a> · <a href="index.html" class="small text-muted">返回首页</a>
        </p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var login = document.getElementById('login').value.trim();
      var password = document.getElementById('password').value;
      var name = document.getElementById('name').value.trim();
      var contact = document.getElementById('contact').value.trim();
      var idNo = document.getElementById('idNo').value.trim();
      var result = Auth.registerBidder(login, password, name, contact, idNo);
      if (result.ok) {
        location.href = 'index.html';
      } else {
        alert(result.msg || '注册失败');
      }
    });
  </script>
</body>
</html>
