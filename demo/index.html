<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拍卖系统 Demo - 入口</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <header class="text-center mb-4">
      <h1 class="display-5">拍卖系统 Demo</h1>
      <p class="text-muted">仅可演示界面 · 无数据库</p>
      <div id="userBar" class="mt-2">
        <span id="userInfo" class="d-none"></span>
        <a id="logoutBtn" href="#" class="btn btn-outline-secondary btn-sm ms-2 d-none">退出</a>
        <span id="loginLinks" class="d-none">
          <a href="login-admin.html" class="btn btn-outline-primary btn-sm">管理员登录</a>
          <a href="login-bidder.html" class="btn btn-outline-secondary btn-sm ms-1">竞拍人登录</a>
          <a href="signup.html" class="btn btn-link btn-sm">竞拍人注册</a>
        </span>
      </div>
    </header>
    <nav class="row g-3 justify-content-center" id="navCards">
      <!-- 1. 委托人及拍买管理：仅管理员 -->
      <div class="col-md-6 col-lg-4" id="card-consignor">
        <a href="pages/consignor-lots.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">1. 委托人及拍买管理</h5>
            <p class="card-text text-muted small">委托人管理、拍品管理、拍卖管理</p>
          </div>
        </a>
      </div>
      <!-- 2. 拍品公示：所有人 -->
      <div class="col-md-6 col-lg-4">
        <a href="pages/public-lots.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">2. 拍品公示</h5>
            <p class="card-text text-muted small">公示列表、详情、报名入口</p>
          </div>
        </a>
      </div>
      <!-- 3. 竞价报名：竞拍人登录后 -->
      <div class="col-md-6 col-lg-4" id="card-register">
        <a href="pages/register.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">3. 竞价报名</h5>
            <p class="card-text text-muted small">选拍品、保证金说明，信息从竞拍人登记处带入</p>
          </div>
        </a>
      </div>
      <!-- 4. 竞价：竞拍人出价；管理员可进监控 -->
      <div class="col-md-6 col-lg-4" id="card-bidding">
        <a href="pages/bidding.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">4. 竞价</h5>
            <p class="card-text text-muted small">当前价、出价记录、出价框</p>
          </div>
        </a>
      </div>
      <!-- 报名审核：仅管理员 -->
      <div class="col-md-6 col-lg-4" id="card-approve-register">
        <a href="pages/approve-register.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">竞价报名审核</h5>
            <p class="card-text text-muted small">保证金到账后审核通过即取得竞拍资格</p>
          </div>
        </a>
      </div>
      <!-- 5–7：仅管理员 -->
      <div class="col-md-6 col-lg-4" id="card-results">
        <a href="pages/results.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">5. 拍卖结果汇总及发布</h5>
            <p class="card-text text-muted small">拍品、买受人、成交价、流拍说明</p>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4" id="card-contract">
        <a href="pages/contract.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">6. 签订成交书</h5>
            <p class="card-text text-muted small">成交书内容、确认签署</p>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4" id="card-refund">
        <a href="pages/refund.html" class="card text-decoration-none text-dark h-100 shadow-sm hover-card">
          <div class="card-body">
            <h5 class="card-title">7. 退还保证金</h5>
            <p class="card-text text-muted small">待退款/已退款列表、确认退款</p>
          </div>
        </a>
      </div>
    </nav>
    <p class="text-center mt-4">
      <a href="index.html" class="text-muted">返回首页</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      var user = Auth.getCurrentUser();
      var userInfo = document.getElementById('userInfo');
      var logoutBtn = document.getElementById('logoutBtn');
      var loginLinks = document.getElementById('loginLinks');

      if (user) {
        userInfo.textContent = user.name + '（' + (user.role === 'bidder' ? '竞拍人' : (user.role === 'superadmin' ? '超级管理员' : '管理员')) + '）';
        userInfo.classList.remove('d-none');
        logoutBtn.classList.remove('d-none');
        logoutBtn.href = '#';
        logoutBtn.onclick = function() { Auth.logout(); location.reload(); };
        loginLinks.classList.add('d-none');

        if (user.role !== 'bidder') {
          document.getElementById('card-consignor').style.display = '';
          document.getElementById('card-approve-register').style.display = '';
          document.getElementById('card-results').style.display = '';
          document.getElementById('card-contract').style.display = '';
          document.getElementById('card-refund').style.display = '';
        } else {
          document.getElementById('card-consignor').style.display = 'none';
          document.getElementById('card-approve-register').style.display = 'none';
          document.getElementById('card-results').style.display = 'none';
          document.getElementById('card-contract').style.display = 'none';
          document.getElementById('card-refund').style.display = 'none';
        }
      } else {
        loginLinks.classList.remove('d-none');
        userInfo.classList.add('d-none');
        logoutBtn.classList.add('d-none');
        document.getElementById('card-consignor').style.display = 'none';
        document.getElementById('card-approve-register').style.display = 'none';
        document.getElementById('card-results').style.display = 'none';
        document.getElementById('card-contract').style.display = 'none';
        document.getElementById('card-refund').style.display = 'none';
        var cardRegister = document.getElementById('card-register');
        var cardBidding = document.getElementById('card-bidding');
        cardRegister.querySelector('a').href = 'login-bidder.html?returnUrl=' + encodeURIComponent('pages/register.html');
        cardRegister.querySelector('.card-body').innerHTML = '<h5 class="card-title">3. 竞价报名</h5><p class="card-text text-muted small">选拍品、保证金说明，信息从竞拍人登记处带入</p><p class="card-text text-warning small">请先登录竞拍人账号</p>';
        cardBidding.querySelector('a').href = 'login-bidder.html?returnUrl=' + encodeURIComponent('pages/bidding.html');
        cardBidding.querySelector('.card-body').innerHTML = '<h5 class="card-title">4. 竞价</h5><p class="card-text text-muted small">当前价、出价记录、出价框</p><p class="card-text text-warning small">请先登录竞拍人账号</p>';
      }
    })();
  </script>
</body>
</html>
